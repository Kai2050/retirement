<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Financial Life Model</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --purple: #bc8cff;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Inputs */
        #sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 20px;
        }

        #sidebar h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            height: 4px;
        }

        .val-box {
            width: 80px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 4px 8px;
            text-align: right;
            outline: none;
        }

        /* Main Content */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            /* Scroller */
            padding: 20px;
            gap: 0;
            /* Use specific margins instead of gap for precision */
        }

        .header-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-strip h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .kpi-card {
            background: rgba(48, 54, 61, 0.4);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            border-radius: 4px;
        }

        .kpi-card.scen-b {
            border-left-color: var(--success);
        }

        .kpi-card.real-nw {
            border-left-color: var(--purple);
        }

        .kpi-card.real-nw-b {
            border-left-color: var(--warning);
        }

        .kpi-label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .kpi-value {
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-mono);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .kpi-sub {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Chart Area */
        #charts-container {
            display: flex;
            width: 100%;
            gap: 20px;
            height: 800px;
            /* Explicit height to stabilize Chart.js */
            margin-bottom: 60px;
            /* Big gap to table */
            flex-shrink: 0;
        }

        .chart-canvas-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
            /* Critical for flex items containing canvas */
        }

        .chart-box {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chart-box h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Table Area */
        #table-wrap {
            height: 300px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #161b22;
        }

        th {
            text-align: right;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            padding: 8px 10px;
            text-align: right;
            border-bottom: 1px solid #161b22;
        }

        tr:hover td {
            background: rgba(88, 166, 255, 0.05);
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: inherit;
            text-align: left;
            z-index: 5;
        }

        /* Colors for columns */
        .c-nw {
            color: var(--warning);
            font-weight: 600;
        }

        .c-port {
            color: var(--accent);
        }

        .c-cf-p {
            color: var(--success);
        }

        .c-cf-n {
            color: var(--danger);
        }

        .c-year {
            color: var(--text-dim);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg> Parameters</h2>

        <div class="input-group">
            <label>Retirement Age</label>
            <div class="input-row">
                <input type="range" id="age_retirement" min="55" max="75" value="60">
                <input type="text" id="val_age_retirement" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Current Investments ($)</label>
            <div class="input-row">
                <input type="range" id="current_investments" min="1000000" max="5000000" step="50000" value="2429000">
                <input type="text" id="val_current_investments" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Investment Gain Rate (%)</label>
            <div class="input-row">
                <input type="range" id="investment_gain_rate" min="1" max="10" step="0.1" value="6.0">
                <input type="text" id="val_investment_gain_rate" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Inflation Rate (%)</label>
            <div class="input-row">
                <input type="range" id="inflation_rate" min="0" max="8" step="0.1" value="2.5">
                <input type="text" id="val_inflation_rate" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Nik's Annual Income ($)</label>
            <div class="input-row">
                <input type="range" id="income_nik" min="50000" max="500000" step="5000" value="220000">
                <input type="text" id="val_income_nik" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>House Price Growth (%)</label>
            <div class="input-row">
                <input type="range" id="house_price_growth_rate" min="0" max="10" step="0.1" value="2.0">
                <input type="text" id="val_house_price_growth_rate" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Basic Annual Spend ($)</label>
            <div class="input-row">
                <input type="range" id="basic_spending" min="30000" max="200000" step="1000" value="78000">
                <input type="text" id="val_basic_spending" class="val-box" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Medical Costs Retire ($)</label>
            <div class="input-row">
                <input type="range" id="medical_costs_retirement" min="0" max="100000" step="1000" value="20000">
                <input type="text" id="val_medical_costs_retirement" class="val-box" readonly>
            </div>
        </div>
    </div>

    <div id="main">
        <div class="header-strip">
            <h1>Household Financial Model</h1>
            <div id="scenario-selector" style="display: flex; gap: 5px;">
                <button id="btn-chart-both"
                    style="background:var(--accent); border:none; color:white; padding: 5px 15px; border-radius: 4px; font-size: 11px; cursor: pointer;">Comparison
                    View</button>
            </div>
        </div>

        <div id="charts-container">
            <div class="chart-box">
                <div class="kpi-container">
                    <div class="kpi-card">
                        <div class="kpi-label">Portfolio (A) · 80 | 85</div>
                        <div id="kpi-port-a" class="kpi-value">
                            <span id="port-a-80">$0</span> <span class="kpi-sub">|</span> <span id="port-a-85">$0</span>
                        </div>
                    </div>
                    <div class="kpi-card scen-b">
                        <div class="kpi-label">Portfolio (B) · 80 | 85</div>
                        <div id="kpi-port-b" class="kpi-value">
                            <span id="port-b-80">$0</span> <span class="kpi-sub">|</span> <span id="port-b-85">$0</span>
                        </div>
                    </div>
                </div>
                <h3>Investment Portfolio</h3>
                <div class="chart-canvas-wrapper">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <div class="kpi-container">
                    <div class="kpi-card real-nw">
                        <div class="kpi-label">Real NW (A) · 80 | 85</div>
                        <div class="kpi-value">
                            <span id="real-a-80">$0</span> <span class="kpi-sub">|</span> <span id="real-a-85">$0</span>
                        </div>
                    </div>
                    <div class="kpi-card real-nw-b">
                        <div class="kpi-label">Real NW (B) · 80 | 85</div>
                        <div class="kpi-value">
                            <span id="real-b-80">$0</span> <span class="kpi-sub">|</span> <span id="real-b-85">$0</span>
                        </div>
                    </div>
                </div>
                <h3>Real Net Worth (Inflation-Adjusted)</h3>
                <div class="chart-canvas-wrapper">
                    <canvas id="realNwChart"></canvas>
                </div>
            </div>
        </div>

        <div id="table-wrap">
            <table id="details-table">
                <thead>
                    <tr>
                        <th class="sticky-col">Year/Age</th>
                        <th>Port Start</th>
                        <th>Port End</th>
                        <th>Net CF</th>
                        <th>House Val</th>
                        <th>Net Worth</th>
                        <th>Real NW</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Constants from original model
        const AGE_NOW = 53;
        const AGE_DEATH = 85;
        const CALENDAR_YEAR_NOW = 2026;
        const INCOME_OG = 66000;
        const TAX_RATE_WORKING = 20.0;
        const TAX_RATE_RETIREMENT = 20.0;
        const TAX_RATE_INVESTMENT = 15.0;
        const SALT_DEDUCTION = 14000;
        const CURRENT_HOUSE_VALUE = 2400000;
        const REMAINING_MORTGAGE = 806000;
        const MONTHLY_MORTGAGE_PAYMENT = 6532;
        const MORTGAGE_YEARS_REMAINING = 15;
        const YEARLY_PROPERTY_TAX = 30000;
        const YEARLY_HOME_INSURANCE = 11000;
        const CHILD_COSTS = 61000;
        const MPEG_BALANCE = 100000;
        const SS_NIK_MONTHLY = 1858;
        const SS_OG_MONTHLY = 982;
        const PENSION_NIK_US_MONTHLY = 857;
        const PENSION_NIK_UK_MONTHLY = 308;
        const ONE_OFF_COSTS = { 2026: 50000, 2028: 40000, 2029: 40000, 2030: 40000, 2031: 40000 };

        // --- Calculation Logic ---

        function solveMortgageRate(balance, monthlyPmt, years) {
            let n = years * 12;
            if (monthlyPmt <= 0 || balance <= 0 || n <= 0) return 0;
            let r = 0.005;
            for (let i = 0; i < 2000; i++) {
                let factor = Math.pow(1 + r, n);
                let denom = factor - 1;
                if (Math.abs(denom) < 1e-14) break;
                let f = balance * r * factor / denom - monthlyPmt;
                let df = balance * (factor * (n * r + 1) - n * r - factor) / Math.pow(denom, 2);
                if (Math.abs(df) < 1e-14) break;
                let rNew = r - f / df;
                rNew = Math.max(rNew, 1e-8);
                if (Math.abs(rNew - r) < 1e-10) { r = rNew; break; }
                r = rNew;
            }
            return r;
        }

        const MONTHLY_MORTGAGE_RATE = solveMortgageRate(REMAINING_MORTGAGE, MONTHLY_MORTGAGE_PAYMENT, MORTGAGE_YEARS_REMAINING);

        function amortiseYear(balance, monthlyRate, monthlyPmt, months = 12) {
            let totalPaid = 0;
            let totalInterest = 0;
            for (let i = 0; i < months; i++) {
                if (balance <= 0) break;
                let interest = balance * monthlyRate;
                let principal = monthlyPmt - interest;
                principal = Math.max(0, Math.min(principal, balance));
                balance = Math.max(0, balance - principal);
                totalPaid += interest + principal;
                totalInterest += interest;
            }
            return { balance, totalPaid, totalInterest };
        }

        function runModel(params, payOffMortgage) {
            let rows = [];
            let portfolio = params.current_investments - MPEG_BALANCE;
            let mortBal = payOffMortgage ? 0 : REMAINING_MORTGAGE;
            let mortMonths = payOffMortgage ? 0 : MORTGAGE_YEARS_REMAINING * 12;

            if (payOffMortgage) portfolio -= REMAINING_MORTGAGE;

            let infFactor = 1.0;

            for (let i = 0; i <= (AGE_DEATH - AGE_NOW); i++) {
                let age = AGE_NOW + i;
                let year = CALENDAR_YEAR_NOW + i;
                if (i > 0) infFactor *= (1.0 + params.inflation_rate / 100);

                let isWorking = (age < params.age_retirement);
                let grossIncome = isWorking ? (params.income_nik + INCOME_OG) : 0;
                let invGains = Math.max(0, portfolio) * (params.investment_gain_rate / 100);

                let ssIncome = (age >= 62) ? (SS_NIK_MONTHLY + SS_OG_MONTHLY) * 12 * infFactor : 0;
                let pensionUs = (age >= 62) ? PENSION_NIK_US_MONTHLY * 12 * infFactor : 0;
                let pensionUk = (age >= 67) ? PENSION_NIK_UK_MONTHLY * 12 * infFactor : 0;

                let totalInflows = grossIncome + invGains + ssIncome + pensionUs + pensionUk;

                // Outflows
                let incomeTax = 0;
                if (isWorking && grossIncome > 0) {
                    let taxable = Math.max(0, grossIncome - SALT_DEDUCTION * infFactor);
                    incomeTax = taxable * (TAX_RATE_WORKING / 100);
                } else if (!isWorking && (ssIncome + pensionUs + pensionUk) > 0) {
                    incomeTax = (ssIncome + pensionUs + pensionUk) * (TAX_RATE_RETIREMENT / 100);
                }

                let invTax = invGains * (TAX_RATE_INVESTMENT / 100);

                let annualPmt = 0;
                if (mortMonths > 0) {
                    let monthsNow = Math.min(12, mortMonths);
                    let amort = amortiseYear(mortBal, MONTHLY_MORTGAGE_RATE, MONTHLY_MORTGAGE_PAYMENT, monthsNow);
                    mortBal = amort.balance;
                    annualPmt = amort.totalPaid;
                    mortMonths -= 12;
                }

                let propTax = YEARLY_PROPERTY_TAX;
                let homeIns = YEARLY_HOME_INSURANCE * infFactor;
                let basicSpend = params.basic_spending * infFactor;
                let childCosts = isWorking ? CHILD_COSTS * infFactor : 0;
                let medicalCosts = isWorking ? 0 : params.medical_costs_retirement * infFactor;
                let oneOff = ONE_OFF_COSTS[year] || 0;

                let totalOutflows = incomeTax + invTax + annualPmt + propTax + homeIns + basicSpend + childCosts + medicalCosts + oneOff;

                let netCF = totalInflows - totalOutflows;
                let portStart = portfolio;
                portfolio += netCF;

                let houseVal = CURRENT_HOUSE_VALUE * Math.pow(1 + params.house_price_growth_rate / 100, i);
                let houseEquity = houseVal - mortBal;
                let netWorth = portfolio + houseEquity;
                let realNW = netWorth / infFactor;

                rows.push({
                    year, age, portStart, portEnd: portfolio, netCF, houseVal, netWorth, realNW
                });
            }
            return rows;
        }

        // --- UI Logic ---

        const inputs = [
            'age_retirement', 'current_investments', 'investment_gain_rate',
            'inflation_rate', 'income_nik', 'house_price_growth_rate',
            'basic_spending', 'medical_costs_retirement'
        ];

        let myChart = null;
        let myRealNwChart = null;

        function formatMoney(v) {
            return '$' + Math.round(v).toLocaleString();
        }

        function createChart(ctx, labels, datasets, yLabelFormatter, retireAge) {
            return new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#8b949e', font: { size: 10 }, boxWidth: 10 } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: (context) => {
                                    return context.dataset.label + ': ' + formatMoney(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#30363d' },
                            ticks: {
                                color: '#8b949e',
                                callback: yLabelFormatter
                            }
                        },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    }
                },
                plugins: [{
                    id: 'verticalLines',
                    afterDraw: (chart) => {
                        const { ctx, chartArea, scales } = chart;
                        const drawLine = (age, color, label) => {
                            const x = scales.x.getPixelForValue(age);
                            if (x >= chartArea.left && x <= chartArea.right) {
                                ctx.save();
                                ctx.beginPath();
                                ctx.setLineDash([4, 4]);
                                ctx.strokeStyle = color;
                                ctx.lineWidth = 1;
                                ctx.moveTo(x, chartArea.top);
                                ctx.lineTo(x, chartArea.bottom);
                                ctx.stroke();

                                ctx.fillStyle = color;
                                ctx.font = '9px Inter';
                                ctx.textAlign = 'center';
                                ctx.fillText(label, x, chartArea.top - 5);
                                ctx.restore();
                            }
                        };
                        // Access retireAge from the config or some state
                        const rAge = chart.options.retireAge;
                        drawLine(rAge, '#ffd54f', 'Retire');
                        drawLine(80, '#8b949e', 'Age 80');
                    }
                }]
            });
        }

        function update() {
            let params = {};
            inputs.forEach(id => {
                let el = document.getElementById(id);
                let val = parseFloat(el.value);
                params[id] = val;
                document.getElementById('val_' + id).value = (id.includes('rate') || id.includes('age')) ? val + (id.includes('age') ? '' : '%') : formatMoney(val);
            });

            let dataA = runModel(params, false);
            let dataB = runModel(params, true);

            // Update KPIs at 80 and 85
            const getVal = (data, age, key) => {
                const row = data.find(r => r.age === age) || data[data.length - 1];
                return formatMoney(row[key]);
            };

            document.getElementById('port-a-80').innerText = getVal(dataA, 80, 'portEnd');
            document.getElementById('port-a-85').innerText = getVal(dataA, 85, 'portEnd');
            document.getElementById('port-b-80').innerText = getVal(dataB, 80, 'portEnd');
            document.getElementById('port-b-85').innerText = getVal(dataB, 85, 'portEnd');

            document.getElementById('real-a-80').innerText = getVal(dataA, 80, 'realNW');
            document.getElementById('real-a-85').innerText = getVal(dataA, 85, 'realNW');
            document.getElementById('real-b-80').innerText = getVal(dataB, 80, 'realNW');
            document.getElementById('real-b-85').innerText = getVal(dataB, 85, 'realNW');

            // Update Charts
            const labels = dataA.map(r => r.age);

            // Dataset for Portfolio
            const portDatasets = [
                {
                    label: 'A (Keep)',
                    data: dataA.map(r => r.portEnd),
                    borderColor: '#58a6ff',
                    backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    fill: true,
                    tension: 0.3
                },
                {
                    label: 'B (Payoff)',
                    data: dataB.map(r => r.portEnd),
                    borderColor: '#3fb950',
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3
                }
            ];

            // Dataset for Real NW
            const realNwDatasets = [
                {
                    label: 'A (Keep)',
                    data: dataA.map(r => r.realNW),
                    borderColor: '#bc8cff',
                    backgroundColor: 'rgba(188, 140, 255, 0.1)',
                    fill: true,
                    tension: 0.3
                },
                {
                    label: 'B (Payoff)',
                    data: dataB.map(r => r.realNW),
                    borderColor: '#d29922',
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3
                }
            ];

            const moneyFormatter = value => (value / 1e6).toFixed(1) + 'M';

            if (myChart) {
                myChart.data.labels = labels;
                myChart.data.datasets = portDatasets;
                myChart.options.retireAge = params.age_retirement;
                myChart.update('none');
            } else {
                const ctx = document.getElementById('mainChart').getContext('2d');
                myChart = createChart(ctx, labels, portDatasets, moneyFormatter, params.age_retirement);
            }

            if (myRealNwChart) {
                myRealNwChart.data.labels = labels;
                myRealNwChart.data.datasets = realNwDatasets;
                myRealNwChart.options.retireAge = params.age_retirement;
                myRealNwChart.update('none');
            } else {
                const ctx = document.getElementById('realNwChart').getContext('2d');
                myRealNwChart = createChart(ctx, labels, realNwDatasets, moneyFormatter, params.age_retirement);
            }

            // Update Table (Scenario A)
            let tableHtml = '';
            dataA.forEach(r => {
                tableHtml += `
                <tr>
                    <td class="sticky-col c-year">Age ${r.age} (${r.year})</td>
                    <td>${formatMoney(r.portStart)}</td>
                    <td class="c-port">${formatMoney(r.portEnd)}</td>
                    <td class="${r.netCF >= 0 ? 'c-cf-p' : 'c-cf-n'}">${formatMoney(r.netCF)}</td>
                    <td>${formatMoney(r.houseVal)}</td>
                    <td class="c-nw">${formatMoney(r.netWorth)}</td>
                    <td class="c-nw">${formatMoney(r.realNW)}</td>
                </tr>
            `;
            });
            document.getElementById('table-body').innerHTML = tableHtml;
        }

        // Attach listeners
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', update);
        });

        // Init
        update();
    </script>

</body>

</html>
